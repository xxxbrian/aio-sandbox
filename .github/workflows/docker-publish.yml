name: docker-publish

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional version tag, format: YYYY.MM.DD.HHMMSS"
        required: false
        type: string
      push_latest:
        description: "Also push latest tag"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive image name
        id: prep
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "package_name=${GITHUB_REPOSITORY#*/}" >> "$GITHUB_OUTPUT"

      - name: Resolve version tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="$(date -u +'%Y.%m.%d.%H%M%S')"
          fi

          if ! [[ "$TAG" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}\.[0-9]{6}$ ]]; then
            echo "Invalid image_tag: $TAG"
            echo "Expected format: YYYY.MM.DD.HHMMSS"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Ensure version is greater than existing tags
        uses: actions/github-script@v7
        env:
          TARGET_TAG: ${{ steps.version.outputs.tag }}
          PACKAGE_NAME: ${{ steps.prep.outputs.package_name }}
        with:
          script: |
            const owner = context.repo.owner;
            const target = process.env.TARGET_TAG;
            const packageName = process.env.PACKAGE_NAME.toLowerCase();
            const sem = /^\d{4}\.\d{2}\.\d{2}\.\d{6}$/;

            const ownerInfo = await github.rest.users.getByUsername({ username: owner });
            const isOrg = ownerInfo.data.type === 'Organization';

            const tags = [];
            try {
              for (let page = 1; page <= 10; page++) {
                let res;
                if (isOrg) {
                  res = await github.request('GET /orgs/{org}/packages/{package_type}/{package_name}/versions', {
                    org: owner,
                    package_type: 'container',
                    package_name: packageName,
                    per_page: 100,
                    page,
                  });
                } else {
                  res = await github.request('GET /users/{username}/packages/{package_type}/{package_name}/versions', {
                    username: owner,
                    package_type: 'container',
                    package_name: packageName,
                    per_page: 100,
                    page,
                  });
                }

                const versions = res.data || [];
                if (!versions.length) break;

                for (const v of versions) {
                  const t = v?.metadata?.container?.tags || [];
                  tags.push(...t);
                }

                if (versions.length < 100) break;
              }
            } catch (err) {
              if (err.status === 404) {
                core.info('No existing GHCR package found. First publish allowed.');
              } else {
                throw err;
              }
            }

            const versionTags = [...new Set(tags)].filter(t => sem.test(t)).sort();
            const latest = versionTags.length ? versionTags[versionTags.length - 1] : null;

            core.info(`target=${target}`);
            core.info(`latest=${latest || 'none'}`);

            if (latest && target <= latest) {
              core.setFailed(`Version ${target} must be greater than latest published version ${latest}.`);
            }

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.prep.outputs.image }}:${{ steps.version.outputs.tag }}
            ${{ github.event.inputs.push_latest == 'true' && format('{0}:latest', steps.prep.outputs.image) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push slim
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.slim
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.prep.outputs.image }}:${{ steps.version.outputs.tag }}-slim
            ${{ github.event.inputs.push_latest == 'true' && format('{0}:slim', steps.prep.outputs.image) || '' }}
          cache-from: type=gha,scope=slim
          cache-to: type=gha,mode=max,scope=slim
